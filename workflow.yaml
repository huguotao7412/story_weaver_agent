version: "1.0"
nodes:
  - name: Book_Planner
    agent: book_planner
  - name: Volume_Planner
    agent: volume_planner
  - name: Phase_Planner
    agent: phase_planner
  - name: Chapter_Planner
    agent: chapter_planner
  - name: Chapter_Writer
    agent: chapter_writer
  - name: Human_Review
    agent: human_review
  - name: Memory_Keeper
    agent: memory_keeper
  - name: Continuity_Editor
    agent: continuity_editor

edges:
  - from: Book_Planner
    to: Volume_Planner
  - from: Volume_Planner
    to: Phase_Planner
  - from: Phase_Planner
    to: Chapter_Planner
  - from: Chapter_Planner
    to: Chapter_Writer
  - from: Chapter_Writer
    to: Continuity_Editor
  - from: Memory_Keeper
    to: END

conditional_routes:
  planner_router:
    targets: [Book_Planner, Volume_Planner, Phase_Planner, Chapter_Planner]
  editor_router:
    targets: [Chapter_Writer, Human_Review]
  human_review_router:
    targets: [Memory_Keeper, Chapter_Writer]

interrupt_before:
  - Chapter_Writer
  - Human_Review
